name: news-to-telegram

# Runs on a schedule (and on-demand). GitHub often delays scheduled runs by
# 10-20 min and may skip some under load — fine for a news feed, since the
# look-back window + de-dupe absorb gaps.
on:
  schedule:
    - cron: '*/15 * * * *'   # roughly every 15 minutes
  workflow_dispatch:          # lets you trigger a run manually from the Actions tab

# Never run two copies at once (would double-post / race on seen.db).
concurrency:
  group: news-to-telegram
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Carry the "already posted" DB across runs so nothing double-fires.
      # A unique key each run always saves a fresh copy; restore-keys pulls
      # the most recent previous one.
      - name: Restore de-dupe DB
        uses: actions/cache@v4
        with:
          path: seen.db
          key: seen-db-${{ github.run_id }}
          restore-keys: |
            seen-db-

      - name: Fetch news and post to Telegram
        env:
          # Two sources: GDELT (reliable, real-time) + your Google Alert RSS
          # (curated, but often sparse). De-dupe collapses any overlap.
          SOURCE: gdelt,rss
          ALERT_FEEDS: ${{ secrets.ALERT_FEEDS }}
          GDELT_QUERY: '("data privacy" OR "data protection" OR "AI governance" OR "AI regulation" OR "AI safety" OR cybersecurity OR "data breach" OR ransomware OR cyberattack OR Anthropic OR OpenAI) sourcelang:english'
          GDELT_TIMESPAN: '3h'     # look-back window (runs fire every 1-2h)
          GDELT_MAX: '25'
          MAX_POSTS_PER_RUN: '5'   # cap per run; overflow goes out next run
          NEWSLETTER_MODE: tag     # tag newsletter-worthy items (needs GROQ_API_KEY)
          SCORE_THRESHOLD: '0'     # relevance gate off; tagging only (no dropping)
          PROVIDER: telegram
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Set a GROQ_API_KEY secret to activate newsletter tagging (and the
          # optional relevance gate). Free key at console.groq.com.
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python alerts_to_whatsapp.py
